    <text x="90" y="78" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">Lead Deduplication</text>
    <text x="90" y="95" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">150+ leads/day</text>
  </g>

  <!-- Arrow -->
  <line x1="470" y1="265" x2="540" y2="265" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <defs><marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#14b8a6"/></marker></defs>

  <!-- Node: AI Scoring -->
