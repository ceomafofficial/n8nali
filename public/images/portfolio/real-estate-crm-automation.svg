  <text x="600" y="85" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">Dubai Agency — AI-Powered Pipeline</text>

  <!-- Lead Sources (Left column) -->
  <g filter="url(#shadow2)" transform="translate(50,120)">
    <rect width="160" height="70" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="80" y="30" text-anchor="middle" fill="#f59e0b" font-family="Arial" font-size="13" font-weight="bold">🏠 Property Finder</text>
    <text x="80" y="50" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">Lead Source</text>
  </g>
  <g filter="url(#shadow2)" transform="translate(50,210)">
    <rect width="160" height="70" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="80" y="30" text-anchor="middle" fill="#f59e0b" font-family="Arial" font-size="13" font-weight="bold">🏗️ Bayut</text>
    <text x="80" y="50" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">Lead Source</text>
  </g>
  <g filter="url(#shadow2)" transform="translate(50,300)">
    <rect width="160" height="70" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="80" y="30" text-anchor="middle" fill="#f59e0b" font-family="Arial" font-size="13" font-weight="bold">🌐 Website</text>
    <text x="80" y="50" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">Contact Form</text>
  </g>
  <g filter="url(#shadow2)" transform="translate(50,390)">
    <rect width="160" height="70" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="80" y="30" text-anchor="middle" fill="#f59e0b" font-family="Arial" font-size="13" font-weight="bold">📱 WhatsApp</text>
