  <g filter="url(#shadow2)" transform="translate(900,400)">
    <rect width="180" height="90" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect width="180" height="30" rx="12" fill="url(#gold)"/>
    <text x="90" y="20" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">NURTURE</text>
    <text x="90" y="55" text-anchor="middle" fill="#e2e8f0" font-family="Arial" font-size="13" font-weight="bold">📧 7-Touch Seq</text>
    <text x="90" y="75" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">WhatsApp + Email</text>
  </g>

  <!-- Stats bar -->
  <g transform="translate(80,520)">
    <rect width="1040" height="75" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="130" y="32" text-anchor="middle" fill="#14b8a6" font-family="Arial" font-size="22" font-weight="bold">27s</text>
    <text x="130" y="52" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">Avg Response</text>
    <text x="390" y="32" text-anchor="middle" fill="#f43f5e" font-family="Arial" font-size="22" font-weight="bold">3.5x</text>
    <text x="390" y="52" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">Conversion Up</text>
    <text x="650" y="32" text-anchor="middle" fill="#f59e0b" font-family="Arial" font-size="22" font-weight="bold">AED 8M</text>
    <text x="650" y="52" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">Revenue Added</text>
    <text x="910" y="32" text-anchor="middle" fill="#0ea5e9" font-family="Arial" font-size="22" font-weight="bold">4hrs</text>
    <text x="910" y="52" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">Time Saved Daily</text>
  </g>

  <text x="600" y="622" text-anchor="middle" fill="#475569" font-family="Arial" font-size="12">Powered by n8nera.com</text>
</svg>