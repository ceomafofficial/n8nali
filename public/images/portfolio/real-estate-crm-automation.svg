  <line x1="210" y1="245" x2="290" y2="250" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="210" y1="335" x2="290" y2="270" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="210" y1="425" x2="290" y2="280" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>

