    <text x="90" y="22" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">AI SCORE</text>
    <text x="90" y="58" text-anchor="middle" fill="#e2e8f0" font-family="Arial" font-size="14" font-weight="bold">🧠 GPT-4</text>
    <text x="90" y="78" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">Intent + Budget</text>
    <text x="90" y="95" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">Score 0-100</text>
  </g>

  <!-- Arrow -->
  <line x1="720" y1="265" x2="790" y2="265" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrowRose)"/>
  <defs><marker id="arrowRose" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e"/></marker></defs>

  <!-- Node: HubSpot CRM -->
