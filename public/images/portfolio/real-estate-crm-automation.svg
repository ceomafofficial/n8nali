    <rect width="180" height="90" rx="12" fill="#1e293b" stroke="#14b8a6" stroke-width="2"/>
    <rect width="180" height="30" rx="12" fill="url(#teal)"/>
    <text x="90" y="20" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">MATCH</text>
    <text x="90" y="55" text-anchor="middle" fill="#e2e8f0" font-family="Arial" font-size="13" font-weight="bold">🏢 Property Match</text>
    <text x="90" y="75" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">Listing Database</text>
